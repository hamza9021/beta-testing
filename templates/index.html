<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YOLOv8 Device Detector — Live</title>
  <meta name="description" content="Real-time YOLOv8 object detection for mobile phones, laptops, and smartwatches via browser." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8z"/>
          <circle cx="12" cy="12" r="3"/>
          <path d="M7 2l2 4M15 2l2 4M7 22l2-4M15 22l2-4"/>
        </svg>
      </div>
      <div>
        <h1 class="brand-title">YOLOv8 Device Detector</h1>
        <p class="brand-sub">Mobile Phone &bull; Laptop &bull; Smart Watch</p>
      </div>
    </div>
    <div class="live-badge" id="liveBadge">
      <span class="live-dot"></span>
      LIVE
    </div>
  </header>

  <!-- ── Main layout ────────────────────────────────────────────── -->
  <main class="layout">

    <!-- Video panel -->
    <section class="video-panel">
      <div class="video-wrapper">
        <img id="videoFeed" src="/video_feed" alt="Live Detection Feed" />
        <div class="video-overlay-corner top-left">
          <span class="corner-label">YOLOv8n · COCO</span>
        </div>
      </div>
    </section>

    <!-- Sidebar -->
    <aside class="sidebar">

      <!-- FPS Card -->
      <div class="card glow-cyan">
        <div class="card-label">Frame Rate</div>
        <div class="card-value" id="fpsValue">—</div>
        <div class="card-unit">fps</div>
        <div class="fps-bar-track">
          <div class="fps-bar-fill" id="fpsBar"></div>
        </div>
      </div>

      <!-- Detection Count Card -->
      <div class="card glow-green">
        <div class="card-label">Objects Detected</div>
        <div class="card-value" id="totalValue">0</div>
        <div class="card-unit">in frame</div>
      </div>

      <!-- Per-class breakdown -->
      <div class="card">
        <div class="card-label">Class Breakdown</div>
        <div class="class-list">
          <div class="class-row" id="row-phone">
            <div class="class-dot" style="background:#ffe843;"></div>
            <span class="class-name">Mobile Phone</span>
            <span class="class-count" id="cnt-phone">0</span>
          </div>
          <div class="class-row" id="row-laptop">
            <div class="class-dot" style="background:#00ff78;"></div>
            <span class="class-name">Laptop / Notebook</span>
            <span class="class-count" id="cnt-laptop">0</span>
          </div>
          <div class="class-row" id="row-watch">
            <div class="class-dot" style="background:#ff5050;"></div>
            <span class="class-name">Smart Watch</span>
            <span class="class-count" id="cnt-watch">0</span>
          </div>
        </div>
      </div>

      <!-- Confidence Slider -->
      <div class="card">
        <div class="card-label">
          Confidence Threshold
          <span class="conf-display" id="confDisplay">0.40</span>
        </div>
        <input
          type="range"
          id="confSlider"
          class="slider"
          min="0.05"
          max="0.95"
          step="0.01"
          value="0.40"
        />
        <div class="slider-labels">
          <span>Sensitive</span>
          <span>Precise</span>
        </div>
      </div>

      <!-- Status Card -->
      <div class="card card-status">
        <div class="status-row">
          <span class="status-label">Model</span>
          <span class="status-val mono">YOLOv8n.pt</span>
        </div>
        <div class="status-row">
          <span class="status-label">Stream</span>
          <span class="status-val mono">MJPEG</span>
        </div>
        <div class="status-row">
          <span class="status-label">Target Classes</span>
          <span class="status-val mono">3</span>
        </div>
        <div class="status-row">
          <span class="status-label">Last Update</span>
          <span class="status-val mono" id="lastUpdate">—</span>
        </div>
      </div>

    </aside>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
